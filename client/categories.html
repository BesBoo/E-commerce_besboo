<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh mục sản phẩm - BesBoo</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Categories Specific Styles */
        .categories-header {
            background: var(--color-surface-tile-1, #1d1d1f);
            padding: 80px 0;
            color: var(--color-on-dark, #f5f5f7);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .categories-header .container {
            position: relative;
            z-index: 2;
        }

        .categories-header h1 {
            font-family: var(--font-display);
            font-size: var(--type-display-lg-size, 2.5rem);
            font-weight: var(--type-display-lg-weight, 700);
            letter-spacing: calc(var(--type-display-lg-ls, -0.025em) - 0.01em);
            margin-bottom: var(--space-sm, 12px);
        }

        .categories-header p {
            font-size: var(--type-lead-size, 1.15rem);
            color: var(--color-body-muted, rgba(255,255,255,0.7));
        }

        .categories-main {
            padding: var(--space-section, 60px) 0;
            min-height: 60vh;
        }

        /* Categories Grid */
        .cat-page .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: var(--space-lg, 24px);
            margin-bottom: var(--space-xxl, 40px);
        }

        .cat-page .category-card {
            background: var(--color-canvas, #fff);
            border-radius: var(--rounded-lg, 16px);
            padding: var(--space-xl, 28px);
            border: 1px solid var(--color-hairline, rgba(0,0,0,0.08));
            border-left: 4px solid var(--color-primary, #0066cc);
            transition: border-color 0.2s, transform 0.2s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .cat-page .category-card:hover {
            transform: translateY(-4px);
            border-left-color: var(--color-primary-hover, #004499);
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        .category-header-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-md, 16px);
            position: relative;
            z-index: 2;
        }

        .category-title-section {
            display: flex;
            align-items: center;
            gap: var(--space-md, 16px);
        }

        .category-icon {
            width: 44px;
            height: 44px;
            background: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
            color: var(--color-ink, #1d1d1f);
        }

        .category-name {
            color: var(--color-ink, #1d1d1f);
            font-size: var(--type-tagline-size, 1.25rem);
            font-weight: var(--type-tagline-weight, 700);
            margin: 0;
        }

        .category-count {
            background: var(--color-canvas-parchment, #f5f5f7);
            padding: var(--space-xs, 6px) var(--space-md, 16px);
            border-radius: var(--rounded-pill, 100px);
            color: var(--color-ink-muted-48, rgba(0,0,0,0.48));
            font-size: var(--type-caption-size, 0.85rem);
            font-weight: 500;
        }

        .category-description {
            color: var(--color-ink-muted-48, rgba(0,0,0,0.48));
            font-size: var(--type-body-size, 0.94rem);
            line-height: 1.6;
            margin-bottom: var(--space-lg, 24px);
            position: relative;
            z-index: 2;
        }

        .category-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .category-created {
            color: var(--color-ink-muted-48, rgba(0,0,0,0.48));
            font-size: var(--type-caption-size, 0.85rem);
        }

        .view-products-btn {
            background: var(--color-primary, #0066cc);
            color: var(--color-on-primary, #fff);
            border: none;
            padding: var(--space-sm, 10px) var(--space-lg, 24px);
            border-radius: var(--rounded-pill, 100px);
            cursor: pointer;
            font-weight: 400;
            font-size: var(--type-caption-size, 0.85rem);
            transition: transform 0.15s;
            display: flex;
            align-items: center;
            gap: var(--space-xs, 6px);
        }

        .view-products-btn:active {
            transform: scale(0.95);
        }

        /* Single Category View Styles */
        .cat-page .category-info {
            background: var(--color-canvas, #fff);
            border-radius: var(--rounded-lg, 16px);
            padding: var(--space-xl, 28px);
            border: 1px solid var(--color-hairline, rgba(0,0,0,0.08));
            border-left: 4px solid var(--color-primary, #0066cc);
            margin-bottom: var(--space-xxl, 40px);
        }

        .category-info-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-md, 16px);
        }

        .category-info-title {
            color: var(--color-ink, #1d1d1f);
            font-family: var(--font-display);
            font-size: var(--type-display-md-size, 1.75rem);
            font-weight: var(--type-display-md-weight, 700);
            margin: 0;
            display: flex;
            align-items: center;
            gap: var(--space-md, 16px);
        }

        .back-to-categories {
            background: var(--color-canvas-parchment, #f5f5f7);
            color: var(--color-ink-muted-80, rgba(0,0,0,0.8));
            border: 1px solid var(--color-hairline, rgba(0,0,0,0.08));
            padding: var(--space-sm, 10px) var(--space-lg, 24px);
            border-radius: var(--rounded-pill, 100px);
            cursor: pointer;
            font-weight: 400;
            transition: transform 0.15s;
            display: flex;
            align-items: center;
            gap: var(--space-xs, 6px);
            text-decoration: none;
            font-size: var(--type-caption-size, 0.85rem);
        }

        .back-to-categories:active {
            transform: scale(0.95);
        }

        .product-count {
            background: var(--color-canvas-parchment, #f5f5f7);
            padding: var(--space-xs, 6px) var(--space-md, 16px);
            border-radius: var(--rounded-pill, 100px);
            color: var(--color-ink-muted-48, rgba(0,0,0,0.48));
            font-size: var(--type-caption-size, 0.85rem);
        }

        .filters-section {
            background: var(--color-canvas, #fff);
            border-radius: var(--rounded-lg, 16px);
            padding: var(--space-xl, 28px);
            margin-bottom: var(--space-lg, 24px);
            border: 1px solid var(--color-hairline, rgba(0,0,0,0.08));
        }

        .filters-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-lg, 24px);
            padding-bottom: var(--space-md, 16px);
            border-bottom: 1px solid var(--color-hairline, rgba(0,0,0,0.08));
        }

        .filters-header h3 {
            color: var(--color-ink, #1d1d1f);
            margin: 0;
            display: flex;
            align-items: center;
            gap: var(--space-sm, 10px);
            font-size: var(--type-body-strong-size, 1rem);
        }

        .filters-toggle {
            background: none;
            border: none;
            color: var(--color-primary, #0066cc);
            cursor: pointer;
            font-size: 1.1rem;
            display: none;
        }

        .filters-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-lg, 24px);
            align-items: end;
        }

        .cat-page .filter-group {
            display: flex;
            flex-direction: column;
            gap: var(--space-xs, 6px);
        }

        .cat-page .filter-group label {
            color: var(--color-ink-muted-80, rgba(0,0,0,0.8));
            font-weight: 600;
            font-size: var(--type-caption-size, 0.85rem);
        }

        .cat-page .filter-group input,
        .cat-page .filter-group select {
            padding: var(--space-sm, 10px);
            border: 1px solid var(--color-hairline, rgba(0,0,0,0.08));
            border-radius: var(--rounded-sm, 8px);
            font-size: var(--type-body-size, 0.94rem);
            transition: border-color 0.2s;
            background: var(--color-canvas, #fff);
        }

        .cat-page .filter-group input:focus,
        .cat-page .filter-group select:focus {
            outline: none;
            border-color: var(--color-primary, #0066cc);
        }

        .price-range {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: var(--space-sm, 10px);
            align-items: center;
        }

        .price-separator {
            color: var(--color-ink-muted-48, rgba(0,0,0,0.48));
            font-weight: bold;
        }

        .filter-actions {
            display: flex;
            gap: var(--space-sm, 10px);
        }

        .btn-filter {
            background: var(--color-primary, #0066cc);
            color: var(--color-on-primary, #fff);
            border: none;
            padding: var(--space-sm, 10px) var(--space-xl, 28px);
            border-radius: var(--rounded-pill, 100px);
            cursor: pointer;
            font-weight: 400;
            transition: transform 0.15s;
        }

        .btn-filter:active {
            transform: scale(0.95);
        }

        .btn-clear {
            background: var(--color-canvas-parchment, #f5f5f7);
            color: var(--color-ink-muted-80, rgba(0,0,0,0.8));
            border: 1px solid var(--color-hairline, rgba(0,0,0,0.08));
            padding: var(--space-sm, 10px) var(--space-xl, 28px);
            border-radius: var(--rounded-pill, 100px);
            cursor: pointer;
            font-weight: 400;
            transition: transform 0.15s;
        }

        .btn-clear:active {
            transform: scale(0.95);
        }

        .products-section {
            background: var(--color-canvas, #fff);
            border-radius: var(--rounded-lg, 16px);
            padding: var(--space-xl, 28px);
            border: 1px solid var(--color-hairline, rgba(0,0,0,0.08));
        }

        .cat-page .products-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-xl, 28px);
            padding-bottom: var(--space-md, 16px);
            border-bottom: 1px solid var(--color-hairline, rgba(0,0,0,0.08));
        }

        .cat-page .products-count {
            color: var(--color-ink-muted-48, rgba(0,0,0,0.48));
            font-size: var(--type-body-size, 0.94rem);
        }

        .sort-section {
            display: flex;
            align-items: center;
            gap: var(--space-md, 16px);
        }

        .sort-section label {
            color: var(--color-ink-muted-80, rgba(0,0,0,0.8));
            font-weight: 500;
            font-size: var(--type-caption-size, 0.85rem);
        }

        .sort-section select {
            padding: var(--space-sm, 10px) var(--space-md, 16px);
            border: 1px solid var(--color-hairline, rgba(0,0,0,0.08));
            border-radius: var(--rounded-sm, 8px);
            background: var(--color-canvas, #fff);
            cursor: pointer;
            font-size: var(--type-caption-size, 0.85rem);
        }

        .cat-page .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: var(--space-lg, 24px);
        }

        .loading {
            text-align: center;
            padding: var(--space-section, 60px) var(--space-lg, 24px);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--color-hairline, rgba(0,0,0,0.08));
            border-top: 3px solid var(--color-primary, #0066cc);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto var(--space-lg, 24px);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: var(--space-section, 60px) var(--space-lg, 24px);
            color: var(--color-ink-muted-48, rgba(0,0,0,0.48));
        }

        .empty-state i {
            font-size: 3rem;
            color: var(--color-ink-muted-48, rgba(0,0,0,0.48));
            margin-bottom: var(--space-lg, 24px);
        }

        .empty-state h3 {
            margin-bottom: var(--space-sm, 10px);
            color: var(--color-ink, #1d1d1f);
        }

        /* Hide sections by default */
        .categories-overview {
            display: block;
        }

        .single-category-view {
            display: none;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .categories-header h1 {
                font-size: var(--type-display-md-size, 1.75rem);
            }

            .cat-page .categories-grid {
                grid-template-columns: 1fr;
            }

            .category-header-section {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-md, 16px);
            }

            .filters-toggle {
                display: block;
            }

            .filters-content {
                display: none;
                grid-template-columns: 1fr;
                gap: var(--space-md, 16px);
                margin-top: var(--space-md, 16px);
            }

            .filters-content.show {
                display: grid;
            }

            .category-info-header {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-md, 16px);
            }

            .cat-page .products-header {
                flex-direction: column;
                gap: var(--space-lg, 24px);
            }

            .cat-page .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
        }
    </style>
</head>

<body class="cat-page">
    <!-- Shared Header -->
    <div id="site-header" class="site-header"></div>

    <!-- Categories Header -->
    <section class="categories-header">
        <div class="container">
            <h1 id="categoryTitle">Danh mục sản phẩm</h1>
            <p id="categorySubtitle">Khám phá bộ sưu tập đa dạng của chúng tôi</p>
        </div>
    </section>

    <!-- Main Content -->
    <main class="categories-main">
        <div class="container">
            <!-- Categories Overview (Show all categories) -->
            <section class="categories-overview" id="categoriesOverview">
                <div class="categories-grid" id="categoriesGrid">
                    <!-- Categories will be loaded here -->
                </div>
            </section>

            <!-- Single Category View (Show products of selected category) -->
            <section class="single-category-view" id="singleCategoryView">
                <!-- Category Info -->
                <div class="category-info" id="categoryInfo">
                    <div class="category-info-header">
                        <h2 class="category-info-title" id="categoryName">
                            <div class="category-icon" id="categoryIcon">
                                <i class="fas fa-tag"></i>
                            </div>
                            <span id="categoryNameText"></span>
                        </h2>
                        <div style="display: flex; gap: 15px; align-items: center;">
                            <div class="product-count" id="categoryProductCount">
                                0 sản phẩm
                            </div>
                            <a href="#" class="back-to-categories" id="backToCategories">
                                <i class="fas fa-arrow-left"></i>
                                Quay lại danh mục
                            </a>
                        </div>
                    </div>
                    <div class="category-description" id="categoryDescription">
                        Khám phá các sản phẩm chất lượng cao trong danh mục này
                    </div>
                </div>

                <!-- Filters Section -->
                <div class="filters-section">
                    <div class="filters-header">
                        <h3>
                            <i class="fas fa-filter"></i>
                            Bộ lọc tìm kiếm
                        </h3>
                        <button class="filters-toggle" id="filtersToggle">
                            <i class="fas fa-chevron-down"></i>
                        </button>
                    </div>
                    <div class="filters-content" id="filtersContent">
                        <div class="filter-group">
                            <label>Tìm kiếm</label>
                            <input type="text" id="searchFilter" placeholder="Nhập từ khóa...">
                        </div>
                        <div class="filter-group">
                            <label>Khoảng giá</label>
                            <div class="price-range">
                                <input type="number" id="minPrice" placeholder="Từ" min="0">
                                <span class="price-separator">-</span>
                                <input type="number" id="maxPrice" placeholder="Đến" min="0">
                            </div>
                        </div>
                        <div class="filter-group">
                            <label>Thương hiệu</label>
                            <select id="brandFilter">
                                <option value="">Tất cả thương hiệu</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>Màu sắc</label>
                            <select id="colorFilter">
                                <option value="">Tất cả màu sắc</option>
                            </select>
                        </div>
                        <div class="filter-actions">
                            <button class="btn-filter" id="applyFilters">
                                <i class="fas fa-search"></i>
                                Áp dụng
                            </button>
                            <button class="btn-clear" id="clearFilters">
                                <i class="fas fa-times"></i>
                                Xóa bộ lọc
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Products Section -->
                <div class="products-section">
                    <div class="products-header">
                        <div class="products-count" id="productsCount">
                            Đang tải...
                        </div>
                        <div class="sort-section">
                            <label for="sortSelect">Sắp xếp theo:</label>
                            <select id="sortSelect">
                                <option value="created_at-DESC">Mới nhất</option>
                                <option value="created_at-ASC">Cũ nhất</option>
                                <option value="price-ASC">Giá thấp đến cao</option>
                                <option value="price-DESC">Giá cao đến thấp</option>
                                <option value="name-ASC">Tên A-Z</option>
                                <option value="name-DESC">Tên Z-A</option>
                            </select>
                        </div>
                    </div>

                    <div class="products-grid" id="productsGrid">
                        <!-- Products will be loaded here -->
                    </div>

                    <!-- Pagination -->
                    <div class="pagination" id="pagination">
                        <!-- Pagination buttons will be generated here -->
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Shared Footer -->
    <div id="site-footer"></div>

    <!-- Scripts -->
    <script src="js/product-data.js"></script>
    <script src="js/api.js"></script>
    <script src="js/components.js"></script>
    <script>
        // Fixed categories.html JavaScript - Show all categories first, then show products when clicked

        // Global variables
        let allCategories = [];
        let currentCategory = null;
        let currentPage = 1;
        let currentFilters = {};
        let currentSort = 'created_at-DESC';

        // Initialize page
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('Categories page initializing...');

            // Initialize shared layout (header + footer)
            Components.initLayout({ activePage: 'categories', subNavTitle: 'Danh mục' });

            // Navigation categories are now loaded by the shared header component

            // Check if specific category is requested from URL
            const urlParams = new URLSearchParams(window.location.search);
            const categoryId = urlParams.get('category');

            if (categoryId) {
                // Show specific category products
                currentCategory = parseInt(categoryId);
                showSingleCategoryView();
                await loadCategoryData();
                await loadCategoryProducts();
            } else {
                // Show all categories overview
                showCategoriesOverview();
                await loadAllCategories();
            }

            // Update cart count
            await updateCartCount();

            // Setup event listeners
            setupEventListeners();
        });

        // Show categories overview (all categories grid)
        function showCategoriesOverview() {
            console.log('Showing categories overview');
            document.getElementById('categoriesOverview').style.display = 'block';
            document.getElementById('singleCategoryView').style.display = 'none';

            // Update header
            document.getElementById('categoryTitle').textContent = 'Danh mục sản phẩm';
            document.getElementById('categorySubtitle').textContent = 'Khám phá bộ sưu tập đa dạng của chúng tôi';
        }

        // Show single category view (products of selected category)
        function showSingleCategoryView() {
            console.log('Showing single category view');
            document.getElementById('categoriesOverview').style.display = 'none';
            document.getElementById('singleCategoryView').style.display = 'block';
        }

        // Load all categories and display them in grid
        async function loadAllCategories() {
            const categoriesGrid = document.getElementById('categoriesGrid');
            Utils.showLoading(categoriesGrid);

            try {
                console.log('Loading all categories...');
                const response = await API.categories.getCategories();
                console.log('Categories response:', response);

                if (!response.categories || response.categories.length === 0) {
                    showEmptyCategories();
                    return;
                }

                allCategories = response.categories;
                displayCategoriesGrid(response.categories);

            } catch (error) {
                console.error('Error loading categories:', error);
                Utils.showError(categoriesGrid, 'Không thể tải danh mục: ' + error.message);
                Utils.showToast('Không thể tải danh mục', 'error');
            }
        }

        // Display categories in grid
        function displayCategoriesGrid(categories) {
            const categoriesGrid = document.getElementById('categoriesGrid');

            categoriesGrid.innerHTML = categories.map(category => {
                const createdDate = category.created_at ? new Date(category.created_at).toLocaleDateString('vi-VN') : '';
                const iconClass = getCategoryIcon(category.name);

                return `
                    <div class="category-card" onclick="selectCategory(${category.category_id})">
                        <div class="category-header-section">
                            <div class="category-title-section">
                                <div class="category-icon">
                                    <i class="fas ${iconClass}"></i>
                                </div>
                                <h3 class="category-name">${category.name}</h3>
                            </div>
                            <div class="category-count">${category.product_count || 0} sản phẩm</div>
                        </div>
                        <div class="category-description">
                            ${category.description || `Khám phá các sản phẩm chất lượng trong danh mục ${category.name}`}
                        </div>
                        <div class="category-meta">
                            <div class="category-created">${createdDate ? 'Tạo ngày: ' + createdDate : ''}</div>
                            <button class="view-products-btn" onclick="event.stopPropagation(); selectCategory(${category.category_id})">
                                <i class="fas fa-arrow-right"></i>
                                Xem sản phẩm
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Get category icon based on name
        function getCategoryIcon(categoryName) {
            const name = categoryName.toLowerCase();
            const iconMap = [
                { keywords: ['áo thun', 't-shirt'], icon: 'fa-shirt' },
                { keywords: ['áo sơ mi', 'sơ mi'], icon: 'fa-user-tie' },
                { keywords: ['áo khoác', 'hoodie', 'jacket', 'bomber'], icon: 'fa-vest-patches' },
                { keywords: ['quần'], icon: 'fa-person' },
                { keywords: ['giày', 'sneaker', 'shoe'], icon: 'fa-shoe-prints' },
                { keywords: ['phụ kiện', 'túi', 'balo', 'mũ', 'kính'], icon: 'fa-bag-shopping' },
                { keywords: ['váy', 'đầm', 'dress'], icon: 'fa-wand-magic-sparkles' },
                { keywords: ['thể thao', 'sport', 'gym'], icon: 'fa-dumbbell' },
                { keywords: ['sandal', 'dép'], icon: 'fa-socks' },
                { keywords: ['đồ đông', 'áo len', 'mùa đông', 'winter'], icon: 'fa-snowflake' },
                { keywords: ['đồ lót', 'nội y'], icon: 'fa-heart' },
                { keywords: ['túi xách', 'bag'], icon: 'fa-bag-shopping' }
            ];

            for (const entry of iconMap) {
                if (entry.keywords.some(kw => name.includes(kw))) {
                    return entry.icon;
                }
            }
            return 'fa-tag';
        }

        // Select category and show its products
        function selectCategory(categoryId) {
            console.log('Selecting category:', categoryId);
            currentCategory = categoryId;
            currentPage = 1;
            currentFilters = {};

            // Update URL without reload
            const newUrl = new URL(window.location);
            newUrl.searchParams.set('category', categoryId);
            window.history.pushState({ categoryId }, '', newUrl);

            // Show single category view
            showSingleCategoryView();
            loadCategoryData();
            loadCategoryProducts();
        }

        // Load navigation categories
        async function loadNavCategories() {
            try {
                console.log('Loading navigation categories...');
                const response = await API.categories.getCategories();
                console.log('Categories response:', response);

                const navMenu = document.getElementById('navMenu');

                // Clear existing categories except home and all products
                const existingCategories = navMenu.querySelectorAll('li:not(:first-child):not(:nth-child(2))');
                existingCategories.forEach(li => li.remove());

                // Add categories to navigation
                if (response.categories && response.categories.length > 0) {
                    response.categories.forEach(category => {
                        const li = document.createElement('li');
                        li.innerHTML = `<a href="./categories.html?category=${category.category_id}" ${currentCategory === category.category_id ? 'class="active"' : ''}>${category.name}</a>`;
                        navMenu.appendChild(li);
                    });
                }

            } catch (error) {
                console.error('Error loading navigation categories:', error);
                Utils.showToast('Không thể tải danh mục', 'error');
            }
        }

        // Load category data
        async function loadCategoryData() {
            try {
                console.log('Loading category data for ID:', currentCategory);

                // Find category from allCategories or load from server
                let category = allCategories.find(cat => cat.category_id === currentCategory);

                if (!category) {
                    // Load categories from server if not available
                    const categoriesResponse = await API.categories.getCategories();
                    category = categoriesResponse.categories.find(cat => cat.category_id === currentCategory);
                }

                console.log('Found category:', category);

                if (category) {
                    updateCategoryHeader(category);
                } else {
                    console.error('Category not found for ID:', currentCategory);
                    showEmptyState('Danh mục không tồn tại');
                }

            } catch (error) {
                console.error('Error loading category data:', error);
                Utils.showToast('Không thể tải thông tin danh mục', 'error');
                showEmptyState('Không thể tải thông tin danh mục');
            }
        }

        // Update category header
        function updateCategoryHeader(category) {
            console.log('Updating category header with:', category);

            // Update main header
            document.getElementById('categoryTitle').textContent = category.name;
            document.getElementById('categorySubtitle').textContent = `Khám phá các sản phẩm chất lượng trong danh mục ${category.name}`;

            // Update category info section
            document.getElementById('categoryNameText').textContent = category.name;
            document.getElementById('categoryProductCount').textContent = `${category.product_count || 0} sản phẩm`;
            document.getElementById('categoryDescription').textContent = category.description || 'Khám phá các sản phẩm chất lượng cao trong danh mục này';

            // Set category icon based on name
            const iconClass = getCategoryIcon(category.name);
            document.getElementById('categoryIcon').innerHTML = `<i class="fas ${iconClass}"></i>`;
        }

        // Load category products
        async function loadCategoryProducts() {
            const productsGrid = document.getElementById('productsGrid');
            Utils.showLoading(productsGrid);

            try {
                console.log('Loading products for category:', currentCategory);
                console.log('Current filters:', currentFilters);

                // Prepare filters
                const filters = {
                    page: currentPage,
                    limit: 12,
                    category: currentCategory,
                    ...currentFilters
                };

                // Add sort parameters
                const [sortBy, sortOrder] = currentSort.split('-');
                filters.sortBy = sortBy;
                filters.sortOrder = sortOrder;

                console.log('API request filters:', filters);

                const response = await API.products.getProducts(filters);
                console.log('Products response:', response);

                if (!response.products || response.products.length === 0) {
                    showEmptyState('Không tìm thấy sản phẩm nào trong danh mục này');
                    return;
                }

                // Display products
                displayProducts(response.products);
                updateProductsCount(response.pagination?.total_items || response.products.length);

                if (response.pagination) {
                    updatePagination(response.pagination);
                }

                // Load filter options
                loadFilterOptions(response.products);

            } catch (error) {
                console.error('Error loading products:', error);
                Utils.showError(productsGrid, 'Không thể tải sản phẩm: ' + error.message);
                Utils.showToast('Không thể tải sản phẩm', 'error');
            }
        }

        // Display products in grid
        function displayProducts(products) {
            const productsGrid = document.getElementById('productsGrid');

            productsGrid.innerHTML = products.map(product => {
                const discountPrice = product.discount_percent > 0
                    ? product.price * (1 - product.discount_percent / 100)
                    : product.price;

                return `
                    <div class="product-card" onclick="location.href='./product-detail.html?id=${product.product_id}'">
                        <div class="product-image">
                            <img src="${product.image_url || './images/placeholder.jpg'}" alt="${product.name}" loading="lazy" onerror="this.src='./images/placeholder.jpg'">
                            ${product.is_new ? '<span class="product-badge new">Mới</span>' : ''}
                            ${product.discount_percent > 0 ? `<span class="product-badge sale">-${product.discount_percent}%</span>` : ''}
                            <button class="favorite-btn" onclick="event.stopPropagation(); toggleFavorite(${product.product_id}, this)">
                                <i class="far fa-heart"></i>
                            </button>
                        </div>
                        <div class="product-info">
                            <div class="product-category">${product.category_name || 'Sản phẩm'}</div>
                            <h3>${product.name}</h3>
                            <div class="product-rating">
                                <div class="stars">
                                    ${generateStars(product.avg_rating || 0)}
                                </div>
                                <span class="rating-count">(${product.review_count || 0})</span>
                            </div>
                            <div class="product-price">
                                <span class="current-price">${Utils.formatCurrency(discountPrice)}</span>
                                ${product.discount_percent > 0 ? `<span class="original-price">${Utils.formatCurrency(product.price)}</span>` : ''}
                            </div>
                            <div class="product-actions">
                                <button class="add-to-cart" onclick="event.stopPropagation(); addToCart(${product.product_id})">
                                    <i class="fas fa-shopping-cart"></i> Thêm vào giỏ
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Generate stars HTML
        function generateStars(rating) {
            let stars = '';
            for (let i = 1; i <= 5; i++) {
                if (i <= rating) {
                    stars += '<i class="fas fa-star"></i>';
                } else if (i - 0.5 <= rating) {
                    stars += '<i class="fas fa-star-half-alt"></i>';
                } else {
                    stars += '<i class="far fa-star"></i>';
                }
            }
            return stars;
        }

        // Update products count
        function updateProductsCount(totalItems) {
            const productsCount = document.getElementById('productsCount');
            productsCount.textContent = `Hiển thị ${totalItems} sản phẩm`;
        }

        // Update pagination
        function updatePagination(pagination) {
            const paginationContainer = document.getElementById('pagination');

            if (!pagination || pagination.total_pages <= 1) {
                paginationContainer.style.display = 'none';
                return;
            }

            paginationContainer.style.display = 'flex';

            let paginationHTML = '';

            // Previous button
            paginationHTML += `
                <button onclick="changePage(${pagination.current_page - 1})" ${pagination.current_page <= 1 ? 'disabled' : ''}>
                    <i class="fas fa-chevron-left"></i>
                </button>
            `;

            // Page numbers
            const startPage = Math.max(1, pagination.current_page - 2);
            const endPage = Math.min(pagination.total_pages, pagination.current_page + 2);

            if (startPage > 1) {
                paginationHTML += `<button onclick="changePage(1)">1</button>`;
                if (startPage > 2) {
                    paginationHTML += `<button disabled>...</button>`;
                }
            }

            for (let i = startPage; i <= endPage; i++) {
                paginationHTML += `
                    <button onclick="changePage(${i})" ${i === pagination.current_page ? 'class="active"' : ''}>
                        ${i}
                    </button>
                `;
            }

            if (endPage < pagination.total_pages) {
                if (endPage < pagination.total_pages - 1) {
                    paginationHTML += `<button disabled>...</button>`;
                }
                paginationHTML += `<button onclick="changePage(${pagination.total_pages})">${pagination.total_pages}</button>`;
            }

            // Next button
            paginationHTML += `
                <button onclick="changePage(${pagination.current_page + 1})" ${pagination.current_page >= pagination.total_pages ? 'disabled' : ''}>
                    <i class="fas fa-chevron-right"></i>
                </button>
            `;

            paginationContainer.innerHTML = paginationHTML;
        }

        // Change page
        function changePage(page) {
            currentPage = page;
            loadCategoryProducts();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Load filter options
        async function loadFilterOptions(products) {
            // Get unique brands and colors from products
            const brands = [...new Set(products.map(p => p.brand).filter(Boolean))];
            const colors = [...new Set(products.flatMap(p => {
                try {
                    return p.colors ? JSON.parse(p.colors) : [];
                } catch {
                    return [];
                }
            }))];

            // Update brand filter
            const brandFilter = document.getElementById('brandFilter');
            if (brandFilter) {
                brandFilter.innerHTML = '<option value="">Tất cả thương hiệu</option>' +
                    brands.map(brand => `<option value="${brand}">${brand}</option>`).join('');
            }

            // Update color filter
            const colorFilter = document.getElementById('colorFilter');
            if (colorFilter) {
                colorFilter.innerHTML = '<option value="">Tất cả màu sắc</option>' +
                    colors.map(color => `<option value="${color}">${color}</option>`).join('');
            }
        }

        // Show empty state
        function showEmptyState(message) {
            const productsGrid = document.getElementById('productsGrid');
            const productsCount = document.getElementById('productsCount');
            const pagination = document.getElementById('pagination');

            productsGrid.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-box-open"></i>
                    <h3>${message}</h3>
                    <p>Thử điều chỉnh bộ lọc hoặc tìm kiếm sản phẩm khác</p>
                </div>
            `;

            if (productsCount) productsCount.textContent = 'Không có sản phẩm nào';
            if (pagination) pagination.style.display = 'none';
        }

        // Show empty categories
        function showEmptyCategories() {
            const categoriesGrid = document.getElementById('categoriesGrid');
            categoriesGrid.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-folder-open"></i>
                    <h3>Chưa có danh mục nào</h3>
                    <p>Hệ thống đang cập nhật danh mục sản phẩm</p>
                </div>
            `;
        }

        // Back to categories overview
        function backToCategories() {
            console.log('Back to categories overview');
            currentCategory = null;

            // Update URL without reload
            const newUrl = new URL(window.location);
            newUrl.searchParams.delete('category');
            window.history.pushState({}, '', newUrl);

            // Show categories overview
            showCategoriesOverview();
            loadAllCategories();
        }

        // Add to cart function
        async function addToCart(productId) {
            const user = Utils.getUser();
            if (!user) {
                Utils.showToast('Vui lòng đăng nhập để thêm sản phẩm vào giỏ hàng', 'error');
                return;
            }

            try {
                await API.cart.addToCart({
                    product_id: productId,
                    quantity: 1
                });

                Utils.showToast('Đã thêm sản phẩm vào giỏ hàng');
                await updateCartCount();
            } catch (error) {
                console.error('Add to cart error:', error);
                Utils.showToast(error.message || 'Không thể thêm sản phẩm vào giỏ hàng', 'error');
            }
        }

        // Toggle favorite function
        async function toggleFavorite(productId, button) {
            const user = Utils.getUser();
            if (!user) {
                Utils.showToast('Vui lòng đăng nhập để thêm sản phẩm yêu thích', 'error');
                return;
            }

            try {
                const response = await API.favorites.toggleFavorite(productId);
                const icon = button.querySelector('i');

                if (response.is_favorite) {
                    icon.className = 'fas fa-heart';
                    button.classList.add('active');
                } else {
                    icon.className = 'far fa-heart';
                    button.classList.remove('active');
                }

                Utils.showToast(response.message);
            } catch (error) {
                console.error('Toggle favorite error:', error);
                Utils.showToast(error.message || 'Không thể cập nhật sản phẩm yêu thích', 'error');
            }
        }

        // Update cart count
        async function updateCartCount() {
            const user = Utils.getUser();
            const cartCountElement = document.getElementById('cartCount');

            if (!cartCountElement) return;

            if (!user) {
                cartCountElement.textContent = '0';
                return;
            }

            try {
                const response = await API.cart.getCart();
                const count = response.total_items || response.item_count || 0;
                cartCountElement.textContent = count;

                const cartBadges = document.querySelectorAll('.cart-count, .cart-badge');
                cartBadges.forEach(badge => {
                    badge.textContent = count;
                    badge.style.display = count > 0 ? 'inline-block' : 'none';
                });
            } catch (error) {
                console.error('Error updating cart count:', error);
                cartCountElement.textContent = '0';
            }
        }

        // Setup event listeners
        function setupEventListeners() {
            // User menu toggle
            const userBtn = document.getElementById('userBtn');
            const userDropdown = document.getElementById('userDropdown');

            if (userBtn && userDropdown) {
                userBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    userDropdown.classList.toggle('show');
                });
            }

            // Close dropdown when clicking outside
            document.addEventListener('click', () => {
                if (userDropdown) {
                    userDropdown.classList.remove('show');
                }
            });

            // Logout button
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    API.auth.logout();
                });
            }

            // Search functionality
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');

            const performSearch = () => {
                const query = searchInput.value.trim();
                if (query) {
                    window.location.href = `./product.html?search=${encodeURIComponent(query)}`;
                }
            };

            if (searchBtn) {
                searchBtn.addEventListener('click', performSearch);
            }

            if (searchInput) {
                searchInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        performSearch();
                    }
                });
            }

            // Back to categories button
            const backBtn = document.getElementById('backToCategories');
            if (backBtn) {
                backBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    backToCategories();
                });
            }

            // Filters toggle for mobile
            const filtersToggle = document.getElementById('filtersToggle');
            const filtersContent = document.getElementById('filtersContent');

            if (filtersToggle && filtersContent) {
                filtersToggle.addEventListener('click', () => {
                    filtersContent.classList.toggle('show');
                    const icon = filtersToggle.querySelector('i');
                    if (icon) {
                        icon.classList.toggle('fa-chevron-down');
                        icon.classList.toggle('fa-chevron-up');
                    }
                });
            }

            // Apply filters
            const applyFiltersBtn = document.getElementById('applyFilters');
            if (applyFiltersBtn) {
                applyFiltersBtn.addEventListener('click', applyFilters);
            }

            // Clear filters
            const clearFiltersBtn = document.getElementById('clearFilters');
            if (clearFiltersBtn) {
                clearFiltersBtn.addEventListener('click', clearFilters);
            }

            // Sort change
            const sortSelect = document.getElementById('sortSelect');
            if (sortSelect) {
                sortSelect.addEventListener('change', (e) => {
                    currentSort = e.target.value;
                    currentPage = 1;
                    loadCategoryProducts();
                });
            }

            // Filter inputs with debounce
            const searchFilter = document.getElementById('searchFilter');
            const minPrice = document.getElementById('minPrice');
            const maxPrice = document.getElementById('maxPrice');
            const brandFilter = document.getElementById('brandFilter');
            const colorFilter = document.getElementById('colorFilter');

            // Auto-apply filters with debounce
            const debouncedApplyFilters = Utils.debounce(() => {
                applyFilters();
            }, 500);

            [searchFilter, minPrice, maxPrice].forEach(input => {
                if (input) {
                    input.addEventListener('input', debouncedApplyFilters);
                }
            });

            [brandFilter, colorFilter].forEach(select => {
                if (select) {
                    select.addEventListener('change', applyFilters);
                }
            });

            // Handle browser back/forward
            window.addEventListener('popstate', (e) => {
                const urlParams = new URLSearchParams(window.location.search);
                const categoryId = urlParams.get('category');

                if (categoryId) {
                    currentCategory = parseInt(categoryId);
                    showSingleCategoryView();
                    loadCategoryData();
                    loadCategoryProducts();
                } else {
                    showCategoriesOverview();
                    loadAllCategories();
                }
            });
        }

        // Apply filters
        function applyFilters() {
            const searchFilter = document.getElementById('searchFilter');
            const minPrice = document.getElementById('minPrice');
            const maxPrice = document.getElementById('maxPrice');
            const brandFilter = document.getElementById('brandFilter');
            const colorFilter = document.getElementById('colorFilter');

            currentFilters = {};

            if (searchFilter && searchFilter.value.trim()) {
                currentFilters.search = searchFilter.value.trim();
            }
            if (minPrice && minPrice.value) {
                currentFilters.minPrice = parseFloat(minPrice.value);
            }
            if (maxPrice && maxPrice.value) {
                currentFilters.maxPrice = parseFloat(maxPrice.value);
            }
            if (brandFilter && brandFilter.value) {
                currentFilters.brand = brandFilter.value;
            }
            if (colorFilter && colorFilter.value) {
                currentFilters.color = colorFilter.value;
            }

            currentPage = 1;
            loadCategoryProducts();
        }

        // Clear filters
        function clearFilters() {
            const searchFilter = document.getElementById('searchFilter');
            const minPrice = document.getElementById('minPrice');
            const maxPrice = document.getElementById('maxPrice');
            const brandFilter = document.getElementById('brandFilter');
            const colorFilter = document.getElementById('colorFilter');

            if (searchFilter) searchFilter.value = '';
            if (minPrice) minPrice.value = '';
            if (maxPrice) maxPrice.value = '';
            if (brandFilter) brandFilter.value = '';
            if (colorFilter) colorFilter.value = '';

            currentFilters = {};
            currentPage = 1;
            loadCategoryProducts();
        }
    </script>
</body>
