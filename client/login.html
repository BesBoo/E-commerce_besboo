<!-- login.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - BesBoo</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <meta name="google-signin-client_id" content="509453702298-ih2qhephj1vvpta80eimv9l78hjstng4.apps.googleusercontent.com">

</head>
<body class="auth-page">
    <div id="site-header"></div>

    <!-- Main Content -->
    <main>
        <div class="container">
            <div class="form-container">
                <div class="form-header">
                    <h2>Đăng nhập</h2>
                    <p>Chào mừng bạn quay trở lại!</p>
                </div>

                <!-- Alert Messages -->
                <div id="alertContainer"></div>

                <!-- Login Form -->
                <form id="loginForm" novalidate>
                    <div class="form-group">
                        <label for="username">Tên đăng nhập hoặc Email <span class="required">*</span></label>
                        <input 
                            type="text" 
                            id="username" 
                            name="username" 
                            class="form-control" 
                            placeholder="Nhập tên đăng nhập hoặc email"
                            required
                        >
                        <div class="error-message" id="usernameError"></div>
                    </div>

                    <div class="form-group">
                        <label for="password">Mật khẩu <span class="required">*</span></label>
                        <div class="password-input-wrapper">
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                class="form-control" 
                                placeholder="Nhập mật khẩu"
                                required
                            >
                            <button type="button" class="password-toggle" id="passwordToggle">
                                <i class="far fa-eye"></i>
                            </button>
                        </div>
                        <div class="error-message" id="passwordError"></div>
                    </div>

                    <div class="form-group">
                        <div class="form-options">
                            <label class="checkbox-wrapper">
                                <input type="checkbox" id="rememberMe" name="rememberMe">
                                <span class="checkmark"></span>
                                Ghi nhớ đăng nhập
                            </label>
                            <a href="/forgot-password" class="forgot-password">Quên mật khẩu?</a>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100" id="loginBtn">
                        <span class="btn-text">Đăng nhập</span>
                        <span class="btn-loading" style="display: none;">
                            <i class="fas fa-spinner fa-spin"></i> Đang xử lý...
                        </span>
                    </button>
                </form>

                <div class="form-footer">
                    <p>Chưa có tài khoản? <a href="./register.html" class="register-link">Đăng ký ngay</a></p>
                    
                    
                    
                    <div class="social-login">
                        <button class="btn btn-social facebook" type="button">
                            <i class="fab fa-facebook-f"></i>
                            Đăng nhập với Facebook
                        </button>
                        <button class="btn btn-social google" type="button">
                            <i class="fab fa-google"></i>
                            Đăng nhập với Google
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>


    <!-- Scripts -->
    <script src="./js/api.js"></script>
    <script src="./js/components.js"></script>
    <script src="./js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Components.initAuthLayout();
            // Check if already logged in
            if (Auth.isLoggedIn()) {
                // Redirect to home if already logged in
                window.location.href = 'index.html';
                return;
            }

            // Initialize login page functionality
            initializeLoginPage();
        });
        const passwordToggle = document.getElementById('passwordToggle');
        const passwordInput = document.getElementById('password');

        passwordToggle.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);

            const icon = passwordToggle.querySelector('i');
            icon.className = type === 'password' ? 'far fa-eye' : 'far fa-eye-slash';
        });

        function initializeLoginPage() {
            const loginForm = document.getElementById('loginForm');
            const passwordToggle = document.getElementById('passwordToggle');
            const passwordInput = document.getElementById('password');

            // Password visibility toggle
            passwordToggle.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                const icon = passwordToggle.querySelector('i');
                icon.className = type === 'password' ? 'far fa-eye' : 'far fa-eye-slash';
            });

            // Form submission
            loginForm.addEventListener('submit', handleLoginSubmit);

            // Enter key submission
            document.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !document.getElementById('loginBtn').disabled) {
                    e.preventDefault();
                    handleLoginSubmit(e);
                }
            });

            // Real-time validation
            setupFormValidation();
        }

        async function handleLoginSubmit(e) {
            e.preventDefault();
            
            const loginBtn = document.getElementById('loginBtn');
            const btnText = loginBtn.querySelector('.btn-text');
            const btnLoading = loginBtn.querySelector('.btn-loading');
            
            // Clear previous errors
            clearAllErrors();
            
            // Get form data
            const formData = new FormData(document.getElementById('loginForm'));
            const credentials = {
                username: formData.get('username').trim(),
                password: formData.get('password')
            };

            // Client-side validation
            if (!validateLoginForm(credentials)) {
                return;
            }

            // Show loading state
            setLoadingState(true);

            try {
                // Call Auth.login which will handle API call and redirect
                await Auth.login(credentials);
                
                // Auth.login handles success cases and redirects
                
            } catch (error) {
                console.error('Login error:', error);
                // Error message is already shown by Auth.login
                
                // Focus on first field with error
                const firstErrorField = document.querySelector('.form-control.error');
                if (firstErrorField) {
                    firstErrorField.focus();
                }
            } finally {
                // Reset loading state
                setLoadingState(false);
            }
        }

        function validateLoginForm(data) {
            let isValid = true;

            // Clear previous errors
            clearAllErrors();

            // Validate username/email
            if (!data.username) {
                showFieldError('username', 'Vui lòng nhập tên đăng nhập hoặc email');
                isValid = false;
            } else if (data.username.length < 3) {
                showFieldError('username', 'Tên đăng nhập phải có ít nhất 3 ký tự');
                isValid = false;
            }

            // Validate password
            if (!data.password) {
                showFieldError('password', 'Vui lòng nhập mật khẩu');
                isValid = false;
            } else if (data.password.length < 6) {
                showFieldError('password', 'Mật khẩu phải có ít nhất 6 ký tự');
                isValid = false;
            }

            return isValid;
        }

        function setupFormValidation() {
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');

            // Real-time validation on blur
            usernameInput.addEventListener('blur', (e) => {
                const value = e.target.value.trim();
                if (value && value.length < 3) {
                    showFieldError('username', 'Tên đăng nhập phải có ít nhất 3 ký tự');
                } else {
                    clearFieldError('username');
                }
            });

            passwordInput.addEventListener('blur', (e) => {
                const value = e.target.value;
                if (value && value.length < 6) {
                    showFieldError('password', 'Mật khẩu phải có ít nhất 6 ký tự');
                } else {
                    clearFieldError('password');
                }
            });

            // Clear errors on input
            usernameInput.addEventListener('input', () => clearFieldError('username'));
            passwordInput.addEventListener('input', () => clearFieldError('password'));
        }

        function setLoadingState(loading) {
            const loginBtn = document.getElementById('loginBtn');
            const btnText = loginBtn.querySelector('.btn-text');
            const btnLoading = loginBtn.querySelector('.btn-loading');
            
            loginBtn.disabled = loading;
            btnText.style.display = loading ? 'none' : 'inline-block';
            btnLoading.style.display = loading ? 'inline-block' : 'none';

            // Disable form inputs while loading
            document.querySelectorAll('#loginForm input, #loginForm button').forEach(element => {
                if (element.id !== 'loginBtn') {
                    element.disabled = loading;
                }
            });
        }

        function showFieldError(fieldName, message) {
            const field = document.getElementById(fieldName);
            const errorElement = document.getElementById(fieldName + 'Error');
            
            if (field && errorElement) {
                field.classList.add('error');
                errorElement.textContent = message;
            }
        }

        function clearFieldError(fieldName) {
            const field = document.getElementById(fieldName);
            const errorElement = document.getElementById(fieldName + 'Error');
            
            if (field && errorElement) {
                field.classList.remove('error');
                errorElement.textContent = '';
            }
        }

        function clearAllErrors() {
            // Clear field errors
            document.querySelectorAll('.form-control').forEach(field => {
                field.classList.remove('error');
            });
            
            document.querySelectorAll('.error-message').forEach(error => {
                error.textContent = '';
            });

            // Clear alert messages
            const alertContainer = document.getElementById('alertContainer');
            if (alertContainer) {
                alertContainer.innerHTML = '';
            }
        }

        // Handle Remember Me functionality (optional enhancement)
        function handleRememberMe() {
            const rememberMe = document.getElementById('rememberMe');
            
            // Load saved username if remember me was checked
            const savedUsername = localStorage.getItem('rememberedUsername');
            if (savedUsername) {
                document.getElementById('username').value = savedUsername;
                rememberMe.checked = true;
            }

            // Save/remove username based on remember me checkbox
            document.getElementById('loginForm').addEventListener('submit', () => {
                const username = document.getElementById('username').value.trim();
                
                if (rememberMe.checked && username) {
                    localStorage.setItem('rememberedUsername', username);
                } else {
                    localStorage.removeItem('rememberedUsername');
                }
            });
        }

        // Initialize remember me functionality
        handleRememberMe();
    </script>

</body>
</html>
