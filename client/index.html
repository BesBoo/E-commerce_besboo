<!-- index.html -->
<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BesBoo — Trang chủ</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div id="site-header"></div>

    <!-- Hero — light tile -->
    <section class="tile tile-light hero">
        <h1 class="tile__headline">Thời trang.<br>Tinh tế hơn.</h1>
        <p class="tile__tagline">Khám phá bộ sưu tập BesBoo — thiết kế tối giản, chất liệu cao cấp.</p>
        <div class="tile__actions btn-group">
            <a href="./product.html" class="btn btn-primary">Mua ngay</a>
            <a href="#featured" class="btn btn-secondary-pill">Tìm hiểu thêm</a>
        </div>
        <div class="hero__visual">
            <img src="./images/hero-collection.png" alt="BesBoo collection" width="640" height="480">
        </div>
    </section>

    <!-- Featured — dark tile -->
    <section class="tile tile-dark" id="featured">
        <div class="container">
            <div class="section-title section-title--compact">
                <h2>Sản phẩm nổi bật</h2>
                <p>Được yêu thích nhất tuần này</p>
            </div>
            <div class="products-grid utility-grid" id="featuredProducts"></div>
        </div>
    </section>

    <!-- New products — light canvas -->
    <main class="homepage">
        <div class="container">
            <section class="new-products">
                <div class="section-title section-title--compact">
                    <h2>Sản phẩm mới</h2>
                    <p>Xu hướng thời trang mới nhất</p>
                </div>
                <div class="products-grid utility-grid" id="newProducts"></div>
            </section>
        </div>
    </main>

    <!-- Categories — parchment tile -->
    <section class="tile tile-parchment categories-section">
        <div class="container">
            <div class="section-title section-title--compact">
                <h2>Danh mục</h2>
                <p>Tìm theo phong cách của bạn</p>
            </div>
            <div class="categories-grid" id="categoriesGrid"></div>
        </div>
    </section>

    <!-- Promotions — dark tile variant -->
    <section class="tile tile-dark-2">
        <div class="container">
            <div class="section-title section-title--compact">
                <h2>Khuyến mãi</h2>
                <p>Ưu đãi có thời hạn</p>
            </div>
            <div class="promotions-grid" id="promotionsGrid"></div>
        </div>
    </section>

    <!-- Newsletter -->
    <div id="site-newsletter"></div>

    <div id="site-footer"></div>

    <script src="./js/product-data.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/components.js"></script>
    <script src="./js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            Components.initLayout({ activePage: 'home', subNavTitle: 'Trang chủ' });
            Components.mountNewsletter('#site-newsletter');

            await loadHomepageData();
        });

        async function loadHomepageData() {
            try {
                await Promise.all([
                    loadCategories(),
                    loadFeaturedProducts(),
                    loadNewProducts(),
                    loadPromotions()
                ]);
            } catch (error) {
                console.error('Error loading homepage:', error);
                Utils.showToast('Có lỗi xảy ra khi tải dữ liệu', 'error');
            }
        }

        async function loadCategories() {
            const grid = document.getElementById('categoriesGrid');
            if (!grid) return;

            try {
                const response = await API.categories.getCategories();
                grid.innerHTML = response.categories
                    .map(cat => Components.renderCategoryCard(cat))
                    .join('');
            } catch (error) {
                console.error('Error loading categories:', error);
                Utils.showError(grid, 'Không thể tải danh mục');
            }
        }

        async function loadFeaturedProducts() {
            const container = document.getElementById('featuredProducts');
            Utils.showLoading(container);

            try {
                const response = await API.products.getFeaturedProducts();
                container.innerHTML = response.products
                    .map(p => Components.renderProductCard(p))
                    .join('');
            } catch {
                Utils.showError(container, 'Không thể tải sản phẩm nổi bật');
            }
        }

        async function loadNewProducts() {
            const container = document.getElementById('newProducts');
            Utils.showLoading(container);

            try {
                const response = await API.products.getNewProducts();
                container.innerHTML = response.products
                    .map(p => Components.renderProductCard(p))
                    .join('');
            } catch {
                Utils.showError(container, 'Không thể tải sản phẩm mới');
            }
        }

        async function loadPromotions() {
            const container = document.getElementById('promotionsGrid');
            Utils.showLoading(container);

            try {
                const response = await API.promotions.getPromotions();
                const promos = response.promotions || response.data || [];
                container.innerHTML = promos.length
                    ? promos.map(p => Components.renderPromotionCard(p)).join('')
                    : '<p class="text-center text-muted">Chưa có khuyến mãi nào.</p>';
            } catch {
                Utils.showError(container, 'Không thể tải khuyến mãi');
            }
        }
    </script>
</body>

</html>
