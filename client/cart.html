<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - BesBoo</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div id="site-header"></div>

<!-- Main Content -->
    <main class="cart-container">
        <div class="cart-header">
            <h1 class="cart-title">
                Giỏ hàng của bạn
                <span class="cart-item-count" id="totalItems">0 sản phẩm</span>
            </h1>
        </div>

        <div class="cart-content" id="cartContent">
            <!-- Loading state -->
            <div class="loading-item">
                <div class="loading-spinner"></div>
                Đang tải giỏ hàng...
            </div>
        </div>
    </main>

    <!-- Cart Actions Template (hidden) -->
    <div class="cart-actions" id="cartActionsTemplate" style="display: none;">
        <a href="./index.html" class="continue-shopping">
            <i class="fas fa-arrow-left"></i>
            Tiếp tục mua sắm
        </a>
        <button class="clear-cart-btn" onclick="CartManager.clearCart()">
            <i class="fas fa-trash"></i>
            Xóa tất cả
        </button>
    </div>

    <!-- Empty Cart Template (hidden) -->
    <div class="empty-cart" id="emptyCartTemplate" style="display: none;">
        <div class="empty-cart-icon">
            <i class="fas fa-shopping-cart"></i>
        </div>
        <h3>Giỏ hàng của bạn đang trống</h3>
        <p>Hãy thêm một số sản phẩm tuyệt vời vào giỏ hàng của bạn</p>
        <a href="./index.html" class="shop-now-btn">
            <i class="fas fa-shopping-bag"></i>
            Mua sắm ngay
        </a>
    </div>

    <div id="site-footer"></div>

<!-- Scripts -->
    <script src="./js/product-data.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/components.js"></script>
    <script src="./js/auth-utils.js"></script>
    <script src="./js/main.js"></script>
    <script src="./js/cart.js"></script>
</body>
</html>
