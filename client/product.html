<!-- product.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản phẩm - BesBoo</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="site-header"></div>

    <!-- Page Header -->
    <section class="page-header">
        <div class="container">
            <h1>Sản phẩm</h1>
            <p>Khám phá bộ sưu tập đa dạng với hàng ngàn sản phẩm chất lượng</p>
        </div>
    </section>

    <!-- Breadcrumb -->
    <section class="breadcrumb">
        <div class="container">
            <ul class="breadcrumb-list">
                <li><a href="./index.html">Trang chủ</a></li>
                <li><i class="fas fa-chevron-right"></i></li>
                <li class="active">Sản phẩm</li>
            </ul>
        </div>
    </section>

    <!-- Main Content -->
    <main class="main-content">
        <div class="products-container">
            <!-- Sidebar Filters -->
            <aside class="products-sidebar">
                <div class="filter-section">
                    <h3><i class="fas fa-filter"></i> Bộ lọc</h3>
                    
                    <!-- Category Filter -->
                    <div class="filter-group">
                        <label for="categoryFilter">Danh mục:</label>
                        <select id="categoryFilter" class="filter-select">
                            <option value="">Tất cả danh mục</option>
                            <!-- Categories will be loaded here -->
                        </select>
                    </div>

                    <!-- Price Filter -->
                    <div class="filter-group">
                        <label>Khoảng giá:</label>
                        <div class="price-range">
                            <input type="number" id="minPrice" class="filter-input" placeholder="Từ" min="0">
                            <input type="number" id="maxPrice" class="filter-input" placeholder="Đến" min="0">
                        </div>
                    </div>

                    <!-- Brand Filter -->
                    <div class="filter-group">
                        <label>Thương hiệu:</label>
                        <div class="filter-checkbox" id="brandFilter">
                            <!-- Brands will be loaded here -->
                        </div>
                    </div>

                    <!-- Color Filter -->
                    <div class="filter-group">
                        <label>Màu sắc:</label>
                        <div class="filter-checkbox" id="colorFilter">
                            <!-- Colors will be loaded here -->
                        </div>
                    </div>

                    <!-- Size Filter -->
                    <div class="filter-group">
                        <label>Kích thước:</label>
                        <div class="filter-checkbox" id="sizeFilter">
                            <!-- Sizes will be loaded here -->
                        </div>
                    </div>

                    <!-- Special Filters -->
                    <div class="filter-group">
                        <label>Đặc biệt:</label>
                        <div class="filter-checkbox">
                            <label>
                                <input type="checkbox" id="featuredFilter" value="1">
                                Sản phẩm nổi bật
                            </label>
                            <label>
                                <input type="checkbox" id="newFilter" value="1">
                                Sản phẩm mới
                            </label>
                            <label>
                                <input type="checkbox" id="discountFilter" value="1">
                                Đang giảm giá
                            </label>
                        </div>
                    </div>

                    <button class="clear-filters" id="clearFilters">
                        <i class="fas fa-times"></i> Xóa bộ lọc
                    </button>
                </div>
            </aside>

            <!-- Products Main -->
            <div class="products-main">
                <!-- Products Header -->
                <div class="products-header">
                    <div class="products-count" id="productsCount">
                        Đang tải...
                    </div>
                    
                    <div class="products-sort">
                        <span>Sắp xếp:</span>
                        <select id="sortSelect" class="sort-select">
                            <option value="created_at-DESC">Mới nhất</option>
                            <option value="price-ASC">Giá: Thấp đến cao</option>
                            <option value="price-DESC">Giá: Cao đến thấp</option>
                            <option value="name-ASC">Tên: A đến Z</option>
                            <option value="name-DESC">Tên: Z đến A</option>
                        </select>
                        
                        <div class="view-toggle">
                            <button class="view-btn active" data-view="grid">
                                <i class="fas fa-th"></i>
                            </button>
                            <button class="view-btn" data-view="list">
                                <i class="fas fa-list"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Products Grid -->
                <div class="products-grid" id="productsGrid">
                    <!-- Products will be loaded here -->
                </div>

                <!-- Pagination -->
                <div class="pagination" id="pagination">
                    <!-- Pagination will be loaded here -->
                </div>
            </div>
        </div>
    </main>

    <div id="site-footer"></div>

    <!-- Scripts -->
    <script src="./js/product-data.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/components.js"></script>
    <script src="./js/main.js"></script>
    <script>
        // Product page state
        let currentPage = 1;
        let currentFilters = {};
        let currentSort = 'created_at-DESC';
        let currentView = 'grid';
        let totalPages = 1;
        let isLoading = false;

        // Initialize product page
        document.addEventListener('DOMContentLoaded', async () => {
            Components.initLayout({ activePage: 'products', subNavTitle: 'Sản phẩm', localSearch: true });

            await initializeProductPage();
            setupEventListeners();
        });

        // Initialize product page
        async function initializeProductPage() {
            try {
                // Load categories for navigation and filters
                await loadCategories();
                
                // Load filter options dynamically
                await loadFilterOptions();
                
                // Handle URL parameters FIRST (before loading products)
                handleUrlParameters();
                
                // Load products with current filters
                await loadProducts();
                
            } catch (error) {
                console.error('Error initializing product page:', error);
                Utils.showToast('Có lỗi xảy ra khi tải trang', 'error');
            }
        }

        // Load categories
        async function loadCategories() {
            try {
                const response = await API.categories.getCategories();
                const categoryFilter = document.getElementById('categoryFilter');
                
                // Add to category filter
                response.categories.forEach(category => {
                    const option = document.createElement('option');
                    option.value = category.category_id;
                    option.textContent = `${category.name} (${category.product_count || 0})`;
                    categoryFilter.appendChild(option);
                });
                
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }

        // Load filter options from data
        async function loadFilterOptions() {
            try {
                const filterOpts = await API.products.getFilterOptions();

                loadFilterCheckboxes('brandFilter', filterOpts.brands || []);
                loadFilterCheckboxes('colorFilter', filterOpts.colors || []);
                loadFilterCheckboxes('sizeFilter', filterOpts.sizes || []);
                
            } catch (error) {
                console.error('Error loading filter options:', error);
            }
        }

        // Load filter checkboxes
        function loadFilterCheckboxes(containerId, options) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            options.forEach(option => {
                const label = document.createElement('label');
                label.innerHTML = `
                    <input type="checkbox" value="${option}">
                    ${option}
                `;
                container.appendChild(label);
            });
        }

        // Load products with filters
        async function loadProducts(page = 1) {
            if (isLoading) return;
            
            isLoading = true;
            const productsGrid = document.getElementById('productsGrid');
            
            // Always show loading when changing pages
            Utils.showLoading(productsGrid);

            // Scroll to top of products grid
            if (page !== currentPage) {
                productsGrid.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
            
            try {
                // Build query parameters
                const params = {
                    page: page,
                    limit: 12,
                    ...currentFilters
                };

                // Add sort parameters
                const [sortBy, sortOrder] = currentSort.split('-');
                params.sortBy = sortBy;
                params.sortOrder = sortOrder;

                const response = await API.products.getProducts(params);
                
                // Always replace products (never append)
                renderProducts(response.products);
                
                // Update pagination
                totalPages = response.pagination.total_pages;
                renderPagination(response.pagination);
                
                // Update products count
                updateProductsCount(response.pagination.total_items);
                
                currentPage = page;
                
            } catch (error) {
                console.error('Error loading products:', error);
                Utils.showError(productsGrid, 'Không thể tải sản phẩm');
            } finally {
                isLoading = false;
            }
        }

        // Render products
        function renderProducts(products) {
            const productsGrid = document.getElementById('productsGrid');
            
            if (products.length === 0) {
                productsGrid.innerHTML = `
                    <div class="no-products">
                        <i class="fas fa-search"></i>
                        <h3>Không tìm thấy sản phẩm</h3>
                        <p>Thử thay đổi bộ lọc hoặc từ khóa tìm kiếm</p>
                    </div>
                `;
                return;
            }

            productsGrid.innerHTML = products.map(product =>
                Components.renderProductCard(product, { showQuickView: true, listView: currentView === 'list' })
            ).join('');
            
            // Update view class
            productsGrid.className = currentView === 'list' ? 'products-list' : 'products-grid';
        }

        // Append products (for pagination)
        function appendProducts(products) {
            const productsGrid = document.getElementById('productsGrid');
            const newProductsHTML = products.map(product =>
                Components.renderProductCard(product, { showQuickView: true, listView: currentView === 'list' })
            ).join('');
            productsGrid.insertAdjacentHTML('beforeend', newProductsHTML);
        }

        // Render pagination
        function renderPagination(pagination) {
            const paginationContainer = document.getElementById('pagination');
            
            if (pagination.total_pages <= 1) {
                paginationContainer.innerHTML = '';
                return;
            }

            let paginationHTML = '';
            
            // Previous button
            paginationHTML += `
                <button onclick="loadProducts(${pagination.current_page - 1})" 
                        ${pagination.current_page === 1 ? 'disabled' : ''}>
                    <i class="fas fa-chevron-left"></i> Trước
                </button>
            `;

            // Page numbers
            const startPage = Math.max(1, pagination.current_page - 2);
            const endPage = Math.min(pagination.total_pages, pagination.current_page + 2);

            if (startPage > 1) {
                paginationHTML += `<button onclick="loadProducts(1)">1</button>`;
                if (startPage > 2) {
                    paginationHTML += '<span>...</span>';
                }
            }

            for (let i = startPage; i <= endPage; i++) {
                paginationHTML += `
                    <button onclick="loadProducts(${i})" 
                            class="${i === pagination.current_page ? 'active' : ''}">
                        ${i}
                    </button>
                `;
            }

            if (endPage < pagination.total_pages) {
                if (endPage < pagination.total_pages - 1) {
                    paginationHTML += '<span>...</span>';
                }
                paginationHTML += `<button onclick="loadProducts(${pagination.total_pages})">${pagination.total_pages}</button>`;
            }

            // Next button
            paginationHTML += `
                <button onclick="loadProducts(${pagination.current_page + 1})" 
                        ${pagination.current_page === pagination.total_pages ? 'disabled' : ''}>
                    Sau <i class="fas fa-chevron-right"></i>
                </button>
            `;

            paginationContainer.innerHTML = paginationHTML;
        }

        // Update products count
        function updateProductsCount(total) {
            const productsCount = document.getElementById('productsCount');
            productsCount.textContent = `Hiển thị ${total} sản phẩm`;
        }

        // Setup event listeners
        function setupEventListeners() {
            // Search functionality
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            
            const performSearch = () => {
                const query = searchInput.value.trim();
                currentFilters.search = query || undefined;
                currentPage = 1;
                loadProducts();
                updateURL();
            };

            if (searchBtn) {
                searchBtn.addEventListener('click', performSearch);
            }

            if (searchInput) {
                searchInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        performSearch();
                    }
                });
            }

            // Sort functionality
            const sortSelect = document.getElementById('sortSelect');
            if (sortSelect) {
                sortSelect.addEventListener('change', (e) => {
                    currentSort = e.target.value;
                    currentPage = 1;
                    loadProducts();
                    updateURL();
                });
            }

            // View toggle
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const viewBtn = e.target.closest('.view-btn');
                    if (!viewBtn) return;
                    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                    viewBtn.classList.add('active');
                    currentView = viewBtn.dataset.view;
                    
                    const productsGrid = document.getElementById('productsGrid');
                    productsGrid.className = currentView === 'list' ? 'products-list' : 'products-grid';
                    
                    // Re-render products in new view
                    loadProducts(currentPage);
                });
            });

            // Filter functionality
            setupFilterListeners();

            // Clear filters
            const clearFilters = document.getElementById('clearFilters');
            if (clearFilters) {
                clearFilters.addEventListener('click', () => {
                    clearAllFilters();
                });
            }

            // Product card click handlers
            document.addEventListener('click', (e) => {
                const productCard = e.target.closest('.product-card');
                if (productCard && !e.target.closest('button')) {
                    const productId = productCard.dataset.productId;
                    viewProductDetail(productId);
                }
            });

        }

        // Setup filter listeners
        function setupFilterListeners() {
            // Category filter
            const categoryFilter = document.getElementById('categoryFilter');
            if (categoryFilter) {
                categoryFilter.addEventListener('change', (e) => {
                    currentFilters.category = e.target.value || undefined;
                    currentPage = 1;
                    loadProducts();
                    updateURL();
                });
            }

            // Price filters
            const minPrice = document.getElementById('minPrice');
            const maxPrice = document.getElementById('maxPrice');
            
            const updatePriceFilter = Utils.debounce(() => {
                currentFilters.minPrice = minPrice.value || undefined;
                currentFilters.maxPrice = maxPrice.value || undefined;
                currentPage = 1;
                loadProducts();
                updateURL();
            }, 500);

            if (minPrice) minPrice.addEventListener('input', updatePriceFilter);
            if (maxPrice) maxPrice.addEventListener('input', updatePriceFilter);

            // Checkbox filters
            setupCheckboxFilters('brandFilter', 'brand');
            setupCheckboxFilters('colorFilter', 'color');
            setupCheckboxFilters('sizeFilter', 'size');

            // Special filters
            const featuredFilter = document.getElementById('featuredFilter');
            const newFilter = document.getElementById('newFilter');
            const discountFilter = document.getElementById('discountFilter');

            if (featuredFilter) {
                featuredFilter.addEventListener('change', (e) => {
                    currentFilters.is_featured = e.target.checked ? 1 : undefined;
                    currentPage = 1;
                    loadProducts();
                    updateURL();
                });
            }

            if (newFilter) {
                newFilter.addEventListener('change', (e) => {
                    currentFilters.is_new = e.target.checked ? 1 : undefined;
                    currentPage = 1;
                    loadProducts();
                    updateURL();
                });
            }

            if (discountFilter) {
                discountFilter.addEventListener('change', (e) => {
                    currentFilters.has_discount = e.target.checked ? 1 : undefined;
                    currentPage = 1;
                    loadProducts();
                    updateURL();
                });
            }
        }

        // Setup checkbox filters
        function setupCheckboxFilters(containerId, filterKey) {
            const container = document.getElementById(containerId);
            if (!container) return;

            container.addEventListener('change', (e) => {
                if (e.target.type === 'checkbox') {
                    const checkedValues = Array.from(container.querySelectorAll('input:checked'))
                        .map(input => input.value);
                    
                    currentFilters[filterKey] = checkedValues.length > 0 ? checkedValues.join(',') : undefined;
                    currentPage = 1;
                    loadProducts();
                    updateURL();
                }
            });
        }

        // Clear all filters
        function clearAllFilters() {
            // Reset filter object
            currentFilters = {};
            currentPage = 1;

            // Reset form controls
            document.getElementById('categoryFilter').value = '';
            document.getElementById('minPrice').value = '';
            document.getElementById('maxPrice').value = '';
            document.getElementById('featuredFilter').checked = false;
            document.getElementById('newFilter').checked = false;
            document.getElementById('discountFilter').checked = false;

            // Clear checkbox filters
            document.querySelectorAll('.filter-checkbox input[type="checkbox"]').forEach(cb => {
                cb.checked = false;
            });

            // Clear search
            document.getElementById('searchInput').value = '';

            // Reload products
            loadProducts();
            updateURL();
            
            Utils.showToast('Đã xóa tất cả bộ lọc');
        }

        // Handle URL parameters
        function handleUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            
            // Handle search parameter
            const search = urlParams.get('search');
            if (search) {
                document.getElementById('searchInput').value = search;
                currentFilters.search = search;
            }

            // Handle category parameter
            const category = urlParams.get('category');
            if (category) {
                document.getElementById('categoryFilter').value = category;
                currentFilters.category = category;
            }

            // Handle other parameters
            const minPrice = urlParams.get('minPrice');
            const maxPrice = urlParams.get('maxPrice');
            if (minPrice) {
                document.getElementById('minPrice').value = minPrice;
                currentFilters.minPrice = minPrice;
            }
            if (maxPrice) {
                document.getElementById('maxPrice').value = maxPrice;
                currentFilters.maxPrice = maxPrice;
            }

            // Update page
            const page = urlParams.get('page');
            if (page) {
                currentPage = parseInt(page);
            }

            // Update sort
            const sort = urlParams.get('sort');
            if (sort) {
                currentSort = sort;
                document.getElementById('sortSelect').value = sort;
            }
        }

        // Update URL with current filters
        function updateURL() {
            const url = new URL(window.location);
            
            // Clear existing parameters
            url.search = '';
            
            // Add current filters
            Object.keys(currentFilters).forEach(key => {
                if (currentFilters[key]) {
                    url.searchParams.set(key, currentFilters[key]);
                }
            });

            // Add page if not 1
            if (currentPage > 1) {
                url.searchParams.set('page', currentPage);
            }

            // Add sort if not default
            if (currentSort !== 'created_at-DESC') {
                url.searchParams.set('sort', currentSort);
            }

            // Update URL without reload
            window.history.pushState({}, '', url);
        }

        window.addEventListener('popstate', () => {
            handleUrlParameters();
            loadProducts();
        });

        function viewProductDetail(productId) {
            window.location.href = `./product-detail.html?id=${productId}`;
        }

        window.addToCart = (id) => Components.addToCart(id);
        window.toggleFavorite = (id, btn) => Components.toggleFavorite(id, btn);
        window.viewProductDetail = viewProductDetail;
        window.loadProducts = loadProducts;
    </script>
</body>
</html>
